name: Polymarket Scanner

on:
  schedule:
    - cron: '*/1 * * * *'
  workflow_dispatch:
  push:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pyyaml -q

      - name: Run Polymarket Scanner
        env:
          DATA_MODE: real
        run: python3 main.py --once

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-results
          path: data/
          retention-days: 1
