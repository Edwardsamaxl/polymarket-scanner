# Polymarket Scanner 配置
# 小木系统 / Edwardsamaxl / 2026-04-23

# ── L1 概率密度套利（Yes+No > 1.02）
l1_min_spread:     0.02   # 套利空间 > 2%
l1_min_net_return: 0.003   # 费后净收益 > 0.3%
l1_min_volume:     10000   # 成交量门槛

# ── L2 跨平台套利（Polymarket vs Kalshi）
l2_min_spread:     0.02   # 两平台价差 > 2%
l2_min_volume:     50000  # 成交量门槛（跨平台需更高流动性）

# ── 通用
min_volume:        5000    # 全局最低成交量
polling_interval:  60      # 秒（由 cron 驱动时不起作用）

# ── 通知配置
notifications:
  # 微信：通过 OpenClaw message 工具（无需配置，自动启用）
  wechat:
    enabled: true

  # Email（SMTP）— 填写以下内容启用
  email:
    enabled: false
    smtp_host: smtp.gmail.com
    smtp_port: 587
    username: your@gmail.com
    password: "your-app-password"   # Gmail 需要 App Password
    to: your@email.com

  # Discord Webhook — 填写以下内容启用
  discord_webhook:
    enabled: false
    url: "https://discord.com/api/webhooks/..."

  # 微信 Push（GitHub Actions 结果检测）
  # 当 GitHub Actions 发现新机会时，会在 data/new_opportunity.json 写入标记
  # 我的 cron 检测到这个文件后推送到微信
  github_result_check:
    enabled: true
    repo: "Edwardsamaxl/polymarket-scanner"
    workflow_file: "data/new_opportunity.json"
